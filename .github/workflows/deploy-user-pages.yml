name: Deploy user GitHub Pages (garrychiao.github.io)

on:
  push:
    branches: [ main ]
    paths:
      - "docs/**"
      - ".github/workflows/deploy-user-pages.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-user-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Checkout target repo (garrychiao.github.io)
        uses: actions/checkout@v4
        with:
          repository: garrychiao/garrychiao.github.io
          token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          path: target

      - name: Sync docs/ -> target/
        run: |
          rsync -av --delete --exclude ".git" ./docs/ ./target/
          # Safety for asset paths
          touch ./target/.nojekyll

      - name: Commit & push (if changes)
        working-directory: target
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A
          if git diff --cached --quiet; then
            echo "No changes to deploy."
            exit 0
          fi

          git commit -m "Deploy from garrychiao/garrychiao@${GITHUB_SHA}"
          git push
